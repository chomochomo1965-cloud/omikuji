<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>神社おみくじ</title>

<style>

body{
text-align:center;
font-family:sans-serif;
background:#fff5f5;
margin:0;
}

h1{
font-size:40px;
color:#b30000;
margin-top:20px;
}

#roulette{
margin:40px auto;
width:320px;
height:320px;
border-radius:50%;
border:12px solid red;
box-shadow:0 0 20px red;
position:relative;
}

canvas{
width:100%;
height:100%;
position:absolute;
top:0;
left:0;
}

.pointer{
position:absolute;
top:-35px;
left:50%;
transform:translateX(-50%);
font-size:42px;
color:red;
z-index:10;
}

button{
font-size:26px;
padding:16px 40px;
background:#d60000;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

#result{
font-size:42px;
margin-top:20px;
color:#b30000;
}

</style>
</head>

<body>

<h1>⛩ 神社おみくじ ⛩</h1>

<div id="roulette">
<div class="pointer">▼</div>
<canvas id="wheel" width="320" height="320"></canvas>
</div>

<br>

<button onclick="spin()">おみくじを引く</button>

<div id="result"></div>

<audio id="win" preload="auto">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

const canvas=document.getElementById("wheel")
const ctx=canvas.getContext("2d")

const fortunes=[
"大吉","中吉","小吉","吉","末吉","凶"
]

const colors=[
"#ff4d4d",
"#ffa500",
"#ffd700",
"#66cc66",
"#66ccff",
"#999"
]

let currentRotation=0

function drawWheel(){

const slice=2*Math.PI/fortunes.length

for(let i=0;i<fortunes.length;i++){

ctx.beginPath()
ctx.moveTo(160,160)
ctx.arc(160,160,160,slice*i,slice*(i+1))

ctx.fillStyle=colors[i]
ctx.fill()

ctx.save()

ctx.translate(160,160)
ctx.rotate(slice*i+slice/2)

ctx.fillStyle="white"
ctx.font="22px sans-serif"
ctx.textAlign="center"

ctx.fillText(fortunes[i],90,5)

ctx.restore()

}

}

drawWheel()

function playWin(){

const win=document.getElementById("win")

if(win.readyState>=2){

win.pause()
win.currentTime=0

win.play().catch(()=>{})

}

}

function spin(){

const slice=360/fortunes.length
const index=Math.floor(Math.random()*fortunes.length)
const result=fortunes[index]

const stopAngle=270-(index*slice+slice/2)
const totalRotation=360*6+stopAngle-currentRotation

let start=null
const duration=4000

function animate(t){

if(!start)start=t

const progress=t-start
const ease=1-Math.pow(1-progress/duration,3)

const rotate=currentRotation+totalRotation*ease
canvas.style.transform="rotate("+rotate+"deg)"

if(progress<duration){

requestAnimationFrame(animate)

}else{

currentRotation=(currentRotation+totalRotation)%360

document.getElementById("result").innerText="結果："+result

playWin()

}

}

requestAnimationFrame(animate)

}

</script>

</body>
</html>
