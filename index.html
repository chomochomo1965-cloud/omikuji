<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⛩ 神社おみくじルーレット ⛩</title>
<link rel="manifest" href="manifest.json">
<style>
body{
  text-align:center;
  font-family:sans-serif;
  background:#fff8f0;
  color:#333;
  margin:0;
}
h1{
  font-size:36px;
  margin-top:20px;
  color:#d60000;
  text-shadow: 2px 2px 4px #ffa500;
}
#roulette{
  margin:30px auto;
  width:300px;
  height:300px;
  border-radius:50%;
  border:10px solid red;
  position:relative;
  box-shadow:0 0 30px red, 0 0 50px gold inset;
}
canvas{
  width:100%;
  height:100%;
  position:absolute;
  top:0;
  left:0;
  z-index:1;
}
.pointer{
  position:absolute;
  top:-32px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  color:red;
  z-index:10;
  text-shadow:1px 1px 3px gold;
}
button{
  font-size:26px;
  padding:15px 40px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px gold;
}
#result{
  font-size:40px;
  margin-top:20px;
  color:#d60000;
  text-shadow:2px 2px 5px gold;
}
</style>
</head>
<body>
<h1>⛩ 神社おみくじルーレット ⛩</h1>

<div id="roulette">
  <div class="pointer">▼</div>
  <canvas id="wheel" width="320" height="320"></canvas>
</div>

<br>
<button onclick="spin()">おみくじを引く</button>
<div id="result"></div>

<!-- 音声ファイル（GitHub 上にアップロード済み想定） -->
<audio id="sound-daikichi" src="daikichi.mp3"></audio>
<audio id="sound-chukichi" src="chukichi.mp3"></audio>
<audio id="sound-shokichi" src="shokichi.mp3"></audio>
<audio id="sound-kichi" src="kichi.mp3"></audio>
<audio id="sound-suekichi" src="suekichi.mp3"></audio>
<audio id="sound-kyou" src="kyou.mp3"></audio>

<script>
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const fortunes=["大吉","中吉","小吉","吉","末吉","凶"];
const colors=["#ff4d4d","#ffa500","#ffd700","#66cc66","#66ccff","#999"];
let currentRotation=0;

function drawWheel(){
  const slice=2*Math.PI/fortunes.length;
  for(let i=0;i<fortunes.length;i++){
    ctx.beginPath();
    ctx.moveTo(160,160);
    ctx.arc(160,160,160,slice*i,slice*(i+1));
    ctx.fillStyle=colors[i];
    ctx.fill();
    ctx.save();
    ctx.translate(160,160);
    ctx.rotate(slice*i+slice/2);
    ctx.fillStyle="white";
    ctx.font="22px sans-serif";
    ctx.textAlign="center";
    ctx.fillText(fortunes[i],90,5);
    ctx.restore();
  }
}

drawWheel();

function playSound(result){
  const sounds={
    "大吉":"sound-daikichi",
    "中吉":"sound-chukichi",
    "小吉":"sound-shokichi",
    "吉":"sound-kichi",
    "末吉":"sound-suekichi",
    "凶":"sound-kyou"
  };
  const audio=document.getElementById(sounds[result]);
  if(audio){ audio.currentTime=0; audio.play(); }
}

function spin(){
  const slice=360/fortunes.length;
  const index=Math.floor(Math.random()*fortunes.length);
  const result=fortunes[index];
  const stopAngle = 270 - (index * slice + slice/2);
  const totalRotation = 360*6 + stopAngle - currentRotation;
  let start=null;
  const duration=4000;

  function animate(t){
    if(!start) start=t;
    const progress=t-start;
    const ease=1-Math.pow(1-progress/duration,3);
    const rotate=currentRotation + totalRotation*ease;
    canvas.style.transform="rotate("+rotate+"deg)";
    // 光る演出
    canvas.style.boxShadow=`0 0 ${20+progress/20}px red, 0 0 ${30+progress/15}px gold inset`;

    if(progress<duration){
      requestAnimationFrame(animate);
    }else{
      currentRotation = (currentRotation + totalRotation) % 360;
      document.getElementById("result").innerText="結果："+result;
      playSound(result);
    }
  }
  requestAnimationFrame(animate);
}
</script>
</body>
</html>
